<html lang="zh-CN">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片粘贴裁剪接续工具</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #d8e0ec;
      --accent: #0a7b83;
      --text: #1b2a3a;
      --danger: #bd2d2d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #e9f6f7, var(--bg) 55%);
      min-height: 100vh;
      overflow-y: auto;
      padding: 16px;
    }

    .wrap {
      /* max-width: 1100px; */
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    .title-box {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }

    .app-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(10, 123, 131, 0.2);
    }

    .title {
      font-family: 'Outfit', "Microsoft YaHei", sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, var(--accent), #14a2ad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hint {
      margin: 0;
      color: #536679;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      position: sticky;
      top: 8px;
      z-index: 30;
      box-shadow: 0 6px 16px rgba(27, 42, 58, 0.1);
    }

    .tool-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .tool-divider {
      width: 1px;
      height: 24px;
      background: #c9d7e6;
      margin: 0 2px;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.danger {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      font-size: 14px;
      color: #3f5165;
    }

    .canvas-box {
      overflow: auto;
      border: 1px dashed #99adbf;
      border-radius: 10px;
      background: #f8fbff;
      min-height: 260px;
      display: grid;
      place-items: center;
      padding: 8px;
    }

    canvas {
      max-width: none;
      display: block;
      background: #fff;
    }

    .empty {
      color: #688096;
      text-align: center;
      font-size: 14px;
      line-height: 1.8;
      padding: 24px 8px;
    }

    .metric {
      font-size: 13px;
      color: #34485c;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .metric span {
      background: #eef4fb;
      border: 1px solid #dbe7f5;
      border-radius: 6px;
      padding: 4px 8px;
    }

    .title-box {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .app-logo {
      width: 32px;
      height: 32px;
    }

    .app-logo svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* 激活状态的工具样式 */
    button.btn-tool.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.btn-tool:not(.active):hover {
      background: #f0f4f9;
      border-color: #abbcca;
    }
  </style>
</head>

<body>
   <div class="wrap">
    <section class="panel">
      <div class="title-box">
        <div class="app-logo">
          <img src="favicon.svg" alt="Logo" />
        </div>
        <h1 class="title">ImageSplice Pro</h1>
      </div>
      <p class="hint">按 <b>Ctrl + V</b> 粘贴图片；拖拽选择裁剪区间：普通拖拽重置，<b>Ctrl</b> 增加，<b>Shift</b> 减去；按 <b>Delete</b> 执行删除并接续。<br>“马赛克”拖拽打码；“画箭头/数字”绘制标注；在标注模式下可直接<b>拖拽移动</b>元素，选中后按 <b>Delete</b> 删除。</p>
    </section>

    <section class="panel toolbar">
      <div class="tool-group">
        <button id="btnUndo" disabled>撤销 (Ctrl+Z)</button>
        <button id="btnRedo" disabled>重做 (Ctrl+Y)</button>
      </div>
      <div class="tool-group">
        <button id="btnSelect" class="btn-tool" disabled>选择删除区间 (S)</button>
      </div>
      <div class="tool-divider" aria-hidden="true"></div>
      <div class="tool-group">
        <button id="btnMosaic" class="btn-tool" disabled>矩形马赛克 (M)</button>
        <button id="btnArrow" class="btn-tool" disabled>画箭头 (A)</button>
        <button id="btnNumber" class="btn-tool" disabled>数字标注 (N)</button>
      </div>
      <div class="tool-divider" aria-hidden="true"></div>
      <div class="tool-group">
        <button id="btnZoomReset" title="缩放还原 1:1" disabled>比例还原</button>
        <button id="btnReset" title="恢复到初始图片" disabled>内容重置</button>
      </div>
      <div class="tool-divider" aria-hidden="true"></div>
      <div class="tool-group">
        <button id="btnSave" class="primary" disabled>下载结果 PNG</button>
      </div>
      <span id="status" class="status">等待粘贴图片...</span>
    </section>

    <section class="panel">
      <div id="metrics" class="metric"></div>
      <div class="canvas-box">
        <canvas id="mainCanvas" hidden></canvas>
        <div id="empty" class="empty">未检测到图片<br />请先复制图片，再在此页面按 Ctrl + V</div>
      </div>
    </section>
  </div>

  <script>
    const canvas = document.getElementById("mainCanvas");
    const ctx = canvas.getContext("2d");
    const canvasBox = document.querySelector(".canvas-box");
    const empty = document.getElementById("empty");
    const statusEl = document.getElementById("status");
    const metricsEl = document.getElementById("metrics");

    const btnUndo = document.getElementById("btnUndo");
    const btnRedo = document.getElementById("btnRedo");
    const btnSelect = document.getElementById("btnSelect");
    const btnMosaic = document.getElementById("btnMosaic");
    const btnArrow = document.getElementById("btnArrow");
    const btnNumber = document.getElementById("btnNumber");
    const btnZoomReset = document.getElementById("btnZoomReset");
    const btnReset = document.getElementById("btnReset");
    const btnSave = document.getElementById("btnSave");

    let imageData = null;
    let originalData = null;
    let selecting = false;
    let dragStartY = null;
    let dragCurrentY = null;
    let currentTool = "range"; // "range", "mosaic", "arrow", "number"
    let annotations = []; // 存储 { type, data }
    let draggingAnnotation = null;
    let selectedAnnotation = null;
    let dragAnnotationOffset = { x: 0, y: 0 };
    let numberCounter = 1;
    const CUT_GAP_PX = 1;
    const CUT_GAP_COLOR = "#ffffff";
    const MOSAIC_BLOCK = 12;
    const MOSAIC_BLUR_RADIUS = 8;
    const ARROW_COLOR = "#ff4d4f"; // 更加亮丽的现代红色
    const ARROW_WIDTH = 3; // 基础宽度比例
    const NUMBER_COLOR = "#ff3333";
    const NUMBER_BG = "#ffffff";
    const NUMBER_SIZE = 24;
    const CLICK_CLEAR_THRESHOLD = 2;
    const ZOOM_MIN = 0.2;
    const ZOOM_MAX = 8;
    const ZOOM_STEP = 0.1;
    let zoomScale = 1;
    const MAX_HISTORY = 30;
    const undoStack = [];
    const redoStack = [];

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function hasSelection() {
      return cutRanges.length > 0;
    }

    function normalizeRange(yA, yB) {
      const y1 = Math.max(0, Math.min(yA, yB));
      const y2 = Math.min(canvas.height, Math.max(yA, yB));
      const h = Math.max(0, Math.round(y2 - y1));
      if (h <= 0) return null;
      return { y1: Math.round(y1), y2: Math.round(y2), h };
    }

    function mergeRanges(ranges) {
      if (ranges.length <= 1) return [...ranges];
      const sorted = [...ranges].sort((a, b) => a.y1 - b.y1);
      const merged = [{ ...sorted[0] }];
      for (let i = 1; i < sorted.length; i++) {
        const cur = sorted[i];
        const last = merged[merged.length - 1];
        if (cur.y1 <= last.y2) {
          last.y2 = Math.max(last.y2, cur.y2);
          last.h = last.y2 - last.y1;
        } else {
          merged.push({ ...cur });
        }
      }
      return merged;
    }

    function addRange(ranges, range) {
      return mergeRanges([...ranges, { ...range }]);
    }

    function subtractRange(ranges, sub) {
      const out = [];
      for (const r of ranges) {
        if (sub.y2 <= r.y1 || sub.y1 >= r.y2) {
          out.push({ ...r });
          continue;
        }
        if (sub.y1 > r.y1) {
          out.push({ y1: r.y1, y2: sub.y1, h: sub.y1 - r.y1 });
        }
        if (sub.y2 < r.y2) {
          out.push({ y1: sub.y2, y2: r.y2, h: r.y2 - sub.y2 });
        }
      }
      return out.filter((r) => r.h > 0);
    }

    function getPreviewRanges() {
      if (!selecting || dragType !== "range") return cutRanges;
      const draft = normalizeRange(dragStartY, dragCurrentY);
      if (!draft) return cutRanges;
      if (dragMode === "add") return addRange(cutRanges, draft);
      if (dragMode === "subtract") return subtractRange(cutRanges, draft);
      return [draft];
    }

    function totalSelectedHeight(ranges) {
      return ranges.reduce((sum, r) => sum + r.h, 0);
    }

    function modeText(mode) {
      if (mode === "add") return "增加";
      if (mode === "subtract") return "减去";
      return "重置";
    }

    function clearSelection() {
      selecting = false;
      dragType = "range";
      dragStartY = null;
      dragCurrentY = null;
      dragMode = "replace";
      cutRanges = [];
      mosaicStart = null;
      mosaicCurrent = null;
    }

    function updateButtons() {
      const hasImage = !!imageData;
      btnUndo.disabled = !hasImage || undoStack.length === 0;
      btnRedo.disabled = !hasImage || redoStack.length === 0;

      btnSelect.disabled = !hasImage;
      btnMosaic.disabled = !hasImage;
      btnArrow.disabled = !hasImage;
      btnNumber.disabled = !hasImage;

      // 更新激活工具的样式
      btnSelect.classList.toggle("active", hasImage && currentTool === "range");
      btnMosaic.classList.toggle("active", hasImage && currentTool === "mosaic");
      btnArrow.classList.toggle("active", hasImage && currentTool === "arrow");
      btnNumber.classList.toggle("active", hasImage && currentTool === "number");

      btnZoomReset.disabled = !hasImage;
      btnReset.disabled = !hasImage;
      btnSave.disabled = !hasImage;
    }

    function applyCanvasZoom() {
      if (!imageData) return;
      canvas.style.width = `${Math.round(canvas.width * zoomScale)}px`;
      canvas.style.height = `${Math.round(canvas.height * zoomScale)}px`;
    }

    function cloneImageData(src) {
      return new ImageData(new Uint8ClampedArray(src.data), src.width, src.height);
    }

    function applyImageData(nextState) {
      const { data, anns, counter } = nextState;
      canvas.width = data.width;
      canvas.height = data.height;
      imageData = cloneImageData(data);
      annotations = JSON.parse(JSON.stringify(anns || []));
      selectedAnnotation = null;
      numberCounter = counter || 1;
      clearSelection();
      render();
    }

    function pushUndoState() {
      if (!imageData) return;
      undoStack.push({
        data: cloneImageData(imageData),
        anns: JSON.parse(JSON.stringify(annotations)),
        counter: numberCounter
      });
      if (undoStack.length > MAX_HISTORY) undoStack.shift();
      redoStack.length = 0;
      updateButtons();
    }

    function clearHistory() {
      undoStack.length = 0;
      redoStack.length = 0;
      updateButtons();
    }

    function updateMetrics() {
      if (!imageData) {
        metricsEl.innerHTML = "";
        return;
      }
      const parts = [
        `<span>宽度: ${canvas.width}px</span>`,
        `<span>高度: ${canvas.height}px</span>`
      ];
      const ranges = getPreviewRanges();
      if (ranges.length > 0) {
        parts.push(`<span>区间数: ${ranges.length}</span>`);
        parts.push(`<span>将删除总高度: ${totalSelectedHeight(ranges)}px</span>`);
      }
      parts.push(`<span>缩放: ${(zoomScale * 100).toFixed(0)}%</span>`);
      if (selecting) {
        if (dragType === "range") {
          parts.push(`<span>当前模式: ${modeText(dragMode)}</span>`);
        } else if (dragType === "mosaic") {
          const rect = normalizeRect(mosaicStart, mosaicCurrent);
          if (rect) {
            parts.push(`<span>马赛克区域: ${rect.w} x ${rect.h}px</span>`);
          }
        }
      }
      parts.push(`<span>当前工具: ${getToolName(currentTool)}</span>`);
      metricsEl.innerHTML = parts.join("");
    }

    function getToolName(tool) {
      if (tool === "range") return "删除区间选择";
      if (tool === "mosaic") return "马赛克";
      if (tool === "arrow") return "画箭头";
      if (tool === "number") return "数字标注";
      return "未知";
    }

    function normalizeRect(a, b) {
      if (!a || !b) return null;
      const x1 = Math.max(0, Math.min(a.x, b.x));
      const y1 = Math.max(0, Math.min(a.y, b.y));
      const x2 = Math.min(canvas.width, Math.max(a.x, b.x));
      const y2 = Math.min(canvas.height, Math.max(a.y, b.y));
      const w = Math.max(0, Math.round(x2 - x1));
      const h = Math.max(0, Math.round(y2 - y1));
      if (w <= 0 || h <= 0) return null;
      return { x: Math.round(x1), y: Math.round(y1), w, h };
    }

    function drawSelectionOverlay() {
      const ranges = getPreviewRanges();
      if (ranges.length > 0) {
        for (const r of ranges) {
          ctx.save();
          ctx.fillStyle = "rgba(189,45,45,0.22)";
          ctx.strokeStyle = "rgba(189,45,45,0.9)";
          ctx.lineWidth = 2;
          ctx.fillRect(0, r.y1, canvas.width, r.h);
          if (r.h >= 2) {
            ctx.strokeRect(1, r.y1 + 1, canvas.width - 2, r.h - 2);
          }
          ctx.restore();
        }
      }

      if (selecting && dragType === "mosaic") {
        const rect = normalizeRect(mosaicStart, mosaicCurrent);
        if (rect) {
          ctx.save();
          ctx.fillStyle = "rgba(10,123,131,0.22)";
          ctx.strokeStyle = "rgba(10,123,131,0.95)";
          ctx.lineWidth = 2;
          ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
          ctx.strokeRect(rect.x + 1, rect.y + 1, Math.max(0, rect.w - 2), Math.max(0, rect.h - 2));
          ctx.restore();
        }
      }

      if (selecting && dragType === "arrow" && arrowStart && arrowCurrent) {
        drawArrow(ctx, arrowStart, arrowCurrent);
      }
    }

    // 绘制单个箭头
    function drawArrow(pCtx, from, to) {
      const dist = Math.hypot(to.x - from.x, to.y - from.y);
      if (dist < 5) return;
      const angle = Math.atan2(to.y - from.y, to.x - from.x);
      const scale = Math.min(1.2, Math.max(0.6, dist / 150));
      const shaftStartWidth = 2 * scale;
      const shaftEndWidth = 10 * scale;
      const headWidth = 28 * scale;
      const headLength = 32 * scale;
      pCtx.save();
      pCtx.fillStyle = ARROW_COLOR;
      const vX = Math.cos(angle + Math.PI / 2);
      const vY = Math.sin(angle + Math.PI / 2);
      const shaftEndX = to.x - Math.cos(angle) * (headLength * 0.8);
      const shaftEndY = to.y - Math.sin(angle) * (headLength * 0.8);
      pCtx.beginPath();
      pCtx.moveTo(from.x - vX * shaftStartWidth / 2, from.y - vY * shaftStartWidth / 2);
      pCtx.lineTo(from.x + vX * shaftStartWidth / 2, from.y + vY * shaftStartWidth / 2);
      pCtx.lineTo(shaftEndX + vX * shaftEndWidth / 2, shaftEndY + vY * shaftEndWidth / 2);
      pCtx.lineTo(shaftEndX - vX * shaftEndWidth / 2, shaftEndY - vY * shaftEndWidth / 2);
      pCtx.closePath();
      pCtx.fill();
      const headBaseX = to.x - Math.cos(angle) * headLength;
      const headBaseY = to.y - Math.sin(angle) * headLength;
      pCtx.beginPath();
      pCtx.moveTo(to.x, to.y);
      pCtx.lineTo(headBaseX + vX * headWidth / 2, headBaseY + vY * headWidth / 2);
      pCtx.lineTo(headBaseX - vX * headWidth / 2, headBaseY - vY * headWidth / 2);
      pCtx.closePath();
      pCtx.fill();
      pCtx.restore();
    }

    // 绘制单个数字
    function drawNumber(pCtx, pos, num) {
      pCtx.save();
      const text = String(num);
      pCtx.font = `bold ${NUMBER_SIZE}px Arial, sans-serif`;
      const radius = NUMBER_SIZE * 0.7;
      pCtx.fillStyle = NUMBER_BG;
      pCtx.beginPath();
      pCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
      pCtx.fill();
      pCtx.strokeStyle = NUMBER_COLOR;
      pCtx.lineWidth = 2;
      pCtx.stroke();
      pCtx.fillStyle = NUMBER_COLOR;
      pCtx.textAlign = "center";
      pCtx.textBaseline = "middle";
      pCtx.fillText(text, pos.x, pos.y);
      pCtx.restore();
    }

    // 将箭头添加到注解层
    function drawArrowOnImage(from, to) {
      annotations.push({ type: "arrow", from: { ...from }, to: { ...to } });
    }

    // 将数字添加到注解层
    function drawNumberOnImage(pos, num) {
      annotations.push({ type: "number", pos: { ...pos }, val: num });
    }

    function render() {
      if (!imageData) {
        canvas.hidden = true;
        empty.hidden = false;
        return;
      }
      canvas.hidden = false;
      empty.hidden = true;
      applyCanvasZoom();
      ctx.putImageData(imageData, 0, 0); // 绘制背景
      // 绘制注解图层
      for (const ann of annotations) {
        if (ann === selectedAnnotation) {
          // 绘制选中高亮
          ctx.save();
          ctx.strokeStyle = "rgba(0, 120, 215, 0.6)";
          ctx.lineWidth = 4;
          if (ann.type === "number") {
            ctx.beginPath();
            ctx.arc(ann.pos.x, ann.pos.y, NUMBER_SIZE * 0.9, 0, Math.PI * 2);
            ctx.stroke();
          } else if (ann.type === "arrow") {
            // 简单的线段加宽描边
            ctx.beginPath();
            ctx.moveTo(ann.from.x, ann.from.y);
            ctx.lineTo(ann.to.x, ann.to.y);
            ctx.stroke();
          }
          ctx.restore();
        }
        if (ann.type === "arrow") drawArrow(ctx, ann.from, ann.to);
        else if (ann.type === "number") drawNumber(ctx, ann.pos, ann.val);
      }
      drawSelectionOverlay(); // 绘制预览
      updateButtons();
      updateMetrics();
    }

    function findAnnotationAt(p) {
      for (let i = annotations.length - 1; i >= 0; i--) {
        const ann = annotations[i];
        if (ann.type === "number") {
          if (Math.hypot(p.x - ann.pos.x, p.y - ann.pos.y) < 20) return ann;
        } else if (ann.type === "arrow") {
          if (isPointNearSegment(p, ann.from, ann.to, 10)) return ann;
        }
      }
      return null;
    }

    function isPointNearSegment(p, a, b, threshold) {
      const l2 = Math.hypot(a.x - b.x, a.y - b.y) ** 2;
      if (l2 === 0) return Math.hypot(p.x - a.x, p.y - a.y) < threshold;
      let t = ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2;
      t = Math.max(0, Math.min(1, t));
      return Math.hypot(p.x - (a.x + t * (b.x - a.x)), p.y - (a.y + t * (b.y - a.y))) < threshold;
    }

    function loadImageToCanvas(img) {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      zoomScale = 1;
      clearSelection();
      clearHistory();
      setStatus(`图片已载入: ${canvas.width} x ${canvas.height}`);
      render();
    }

    async function handlePaste(event) {
      const items = event.clipboardData && event.clipboardData.items;
      if (!items) return;
      for (const item of items) {
        if (item.type && item.type.startsWith("image/")) {
          const file = item.getAsFile();
          if (!file) continue;
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            loadImageToCanvas(img);
            URL.revokeObjectURL(url);
          };
          img.onerror = () => {
            setStatus("图片读取失败，请重试。");
            URL.revokeObjectURL(url);
          };
          img.src = url;
          event.preventDefault();
          return;
        }
      }
      setStatus("剪贴板里没有图片数据。");
    }

    function getCanvasY(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleY = canvas.height / rect.height;
      return (event.clientY - rect.top) * scaleY;
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (event.clientX - rect.left) * scaleX,
        y: (event.clientY - rect.top) * scaleY
      };
    }

    function mosaicRectOnCurrentImage(rect, blockSize) {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tctx = tempCanvas.getContext("2d");
      tctx.putImageData(imageData, 0, 0);
      for (let y = rect.y; y < rect.y + rect.h; y += blockSize) {
        for (let x = rect.x; x < rect.x + rect.w; x += blockSize) {
          const bw = Math.min(blockSize, rect.x + rect.w - x);
          const bh = Math.min(blockSize, rect.y + rect.h - y);
          const blockData = tctx.getImageData(x, y, bw, bh).data;
          let r = 0, g = 0, b = 0, count = 0;
          for (let i = 0; i < blockData.length; i += 4) {
            r += blockData[i]; g += blockData[i + 1]; b += blockData[i + 2];
            count++;
          }
          tctx.fillStyle = `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})`;
          tctx.fillRect(x, y, bw, bh);
        }
      }
      return tctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    function clampZoom(next) {
      return Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, next));
    }

    function updateZoomByWheel(event) {
      if (!imageData || !event.ctrlKey) return;
      event.preventDefault();
      const dir = event.deltaY < 0 ? 1 : -1;
      const next = clampZoom(zoomScale + dir * ZOOM_STEP);
      if (next === zoomScale) return;
      zoomScale = next;
      render();
      setStatus(`当前缩放 ${(zoomScale * 100).toFixed(0)}%`);
    }

    canvas.addEventListener("mousedown", (e) => {
      if (!imageData) return;
      const p = getCanvasPoint(e);
      
      // 检查是否点击了已有注解以进行移动或选中
      if (currentTool === "arrow" || currentTool === "number") {
        const hit = findAnnotationAt(p);
        if (hit) {
          pushUndoState();
          draggingAnnotation = hit;
          selectedAnnotation = hit;
          if (hit.type === "number") {
            dragAnnotationOffset = { x: p.x - hit.pos.x, y: p.y - hit.pos.y };
          } else {
            // 记录箭头整体偏移
            dragAnnotationOffset = { x: p.x, y: p.y }; // 存原始点，更新时算差值
          }
          setStatus(`已选中${hit.type === "number" ? "数字" : "箭头"}，拖拽可移动，按 Delete 可删除`);
          render();
          return;
        } else {
          selectedAnnotation = null;
        }
      }

      selecting = true;
      dragType = currentTool;

      if (currentTool === "mosaic") {
        mosaicStart = p;
        mosaicCurrent = p;
      } else if (currentTool === "arrow") {
        arrowStart = p;
        arrowCurrent = p;
      } else if (currentTool === "number") {
        pushUndoState();
        drawNumberOnImage(p, numberCounter);
        numberCounter++;
        selecting = false;
        setStatus(`已添加数字 ${numberCounter - 1}`);
        render();
        return;
      } else {
        dragType = "range";
        dragStartY = p.y;
        dragCurrentY = p.y;
        if (e.shiftKey) {
          dragMode = "subtract";
        } else if (e.ctrlKey || e.metaKey) {
          dragMode = "add";
        } else {
          dragMode = "replace";
        }
      }
      render();
      updateButtons();
    });

    window.addEventListener("mousemove", (e) => {
      if (!imageData) return;
      const p = getCanvasPoint(e);

      if (draggingAnnotation) {
        if (draggingAnnotation.type === "number") {
          draggingAnnotation.pos.x = p.x - dragAnnotationOffset.x;
          draggingAnnotation.pos.y = p.y - dragAnnotationOffset.y;
        } else if (draggingAnnotation.type === "arrow") {
          const dx = p.x - dragAnnotationOffset.x;
          const dy = p.y - dragAnnotationOffset.y;
          draggingAnnotation.from.x += dx;
          draggingAnnotation.from.y += dy;
          draggingAnnotation.to.x += dx;
          draggingAnnotation.to.y += dy;
          dragAnnotationOffset = { x: p.x, y: p.y };
        }
        render();
        return;
      }

      if (!selecting) return;
      if (dragType === "mosaic") {
        mosaicCurrent = p;
      } else if (dragType === "arrow") {
        arrowCurrent = p;
      } else {
        dragCurrentY = p.y;
      }
      render();
      updateButtons();
    });

    window.addEventListener("mouseup", () => {
      if (draggingAnnotation) {
        draggingAnnotation = null;
        setStatus("移动完成。");
        render();
        return;
      }

      if (!selecting) return;
      if (dragType === "mosaic") {
        const rect = normalizeRect(mosaicStart, mosaicCurrent);
        selecting = false;
        mosaicStart = null;
        mosaicCurrent = null;
        if (rect) {
          pushUndoState();
          // 需要在 baking 马赛克之前先把层级元素固定吗？
          // 不，马赛克是改底图，注解依然在上面
          imageData = mosaicRectOnCurrentImage(rect, MOSAIC_BLOCK);
          setStatus(`已完成马赛克: x=${rect.x}, y=${rect.y}, ${rect.w}x${rect.h}px`);
        } else {
          setStatus("马赛克区域无效，请重新拖拽。");
        }
      } else if (dragType === "arrow") {
        selecting = false;
        if (arrowStart && arrowCurrent) {
          const dist = Math.hypot(arrowCurrent.x - arrowStart.x, arrowCurrent.y - arrowStart.y);
          if (dist > 5) {
            pushUndoState();
            drawArrowOnImage(arrowStart, arrowCurrent);
            setStatus(`已添加箭头`);
          }
        }
        arrowStart = null;
        arrowCurrent = null;
      } else {
        const isPlainClick = dragMode === "replace"
          && dragStartY !== null
          && dragCurrentY !== null
          && Math.abs(dragCurrentY - dragStartY) <= CLICK_CLEAR_THRESHOLD;
        const draft = normalizeRange(dragStartY, dragCurrentY);
        if (isPlainClick) {
          cutRanges = [];
        } else if (draft) {
          if (dragMode === "add") {
            cutRanges = addRange(cutRanges, draft);
          } else if (dragMode === "subtract") {
            cutRanges = subtractRange(cutRanges, draft);
          } else {
            cutRanges = [draft];
          }
        }
        selecting = false;
        dragStartY = null;
        dragCurrentY = null;
        if (hasSelection()) {
          setStatus(`已更新区间：${cutRanges.length} 段，总删除高度 ${totalSelectedHeight(cutRanges)}px。按 Delete 执行删除并接续`);
        } else {
          setStatus("当前没有选中区间。");
        }
      }
      render();
      updateButtons();
    });

    function setTool(tool) {
      if (!imageData) return;
      currentTool = tool;
      selecting = false;
      mosaicStart = null;
      mosaicCurrent = null;
      arrowStart = null;
      arrowCurrent = null;

      const names = {
        range: "删除区间选择：拖拽选择要删除的垂直区间",
        mosaic: `马赛克：拖拽矩形打码（块大小 ${MOSAIC_BLOCK}px）`,
        arrow: "画箭头：拖拽绘制渐进式箭头",
        number: `数字标注：点击图片放置数字 ${numberCounter}`
      };

      setStatus(`${names[tool]}`);
      render();
      updateButtons();
    }

    btnSelect.addEventListener("click", () => setTool("range"));
    btnMosaic.addEventListener("click", () => setTool("mosaic"));
    btnArrow.addEventListener("click", () => setTool("arrow"));
    btnNumber.addEventListener("click", () => setTool("number"));

    btnZoomReset.addEventListener("click", () => {
      if (!imageData) return;
      zoomScale = 1;
      render();
      setStatus("缩放已还原到 1:1");
    });

    function doCut() {
      if (!imageData || !hasSelection()) return;
      const ranges = mergeRanges(cutRanges);
      const removed = totalSelectedHeight(ranges);
      if (removed <= 0 || removed >= canvas.height) {
        setStatus("选中高度无效，无法删除整个图片。");
        return;
      }
      pushUndoState();

      const oldCanvas = document.createElement("canvas");
      oldCanvas.width = canvas.width;
      oldCanvas.height = canvas.height;
      oldCanvas.getContext("2d").putImageData(imageData, 0, 0);

      const gapTotal = CUT_GAP_PX * ranges.length;
      const newH = canvas.height - removed + gapTotal;
      const newCanvas = document.createElement("canvas");
      newCanvas.width = canvas.width;
      newCanvas.height = newH;
      const nctx = newCanvas.getContext("2d");
      nctx.fillStyle = CUT_GAP_COLOR;

      let srcY = 0;
      let dstY = 0;
      for (const r of ranges) {
        const keepH = r.y1 - srcY;
        if (keepH > 0) {
          nctx.drawImage(oldCanvas, 0, srcY, canvas.width, keepH, 0, dstY, canvas.width, keepH);
          dstY += keepH;
        }
        nctx.fillRect(0, dstY, canvas.width, CUT_GAP_PX);
        dstY += CUT_GAP_PX;
        srcY = r.y2;
      }
      const tailH = canvas.height - srcY;
      if (tailH > 0) {
        nctx.drawImage(oldCanvas, 0, srcY, canvas.width, tailH, 0, dstY, canvas.width, tailH);
      }

      // 裁剪时同步更新注解坐标
      transformAnnotations(ranges);

      canvas.width = newCanvas.width;
      canvas.height = newCanvas.height;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(newCanvas, 0, 0);
      imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      clearSelection();
      setStatus(`已删除 ${removed}px（${ranges.length} 段），并插入 ${ranges.length} 条 ${CUT_GAP_PX}px 裁剪缝`);
      render();
    }

    function transformAnnotations(ranges) {
      for (const ann of annotations) {
        if (ann.type === "number") {
          ann.pos.y = calculateNewY(ann.pos.y, ranges);
        } else if (ann.type === "arrow") {
          ann.from.y = calculateNewY(ann.from.y, ranges);
          ann.to.y = calculateNewY(ann.to.y, ranges);
        }
      }
    }

    function calculateNewY(oldY, ranges) {
      let offset = 0;
      for (const r of ranges) {
        if (oldY > r.y2) {
          offset += (r.y2 - r.y1) - CUT_GAP_PX;
        } else if (oldY >= r.y1 && oldY <= r.y2) {
          offset += (oldY - r.y1);
        }
      }
      return oldY - offset;
    }

    btnReset.addEventListener("click", () => {
      if (!originalData) return;
      pushUndoState();
      applyImageData({
        data: originalData,
        anns: [],
        counter: 1
      });
      setStatus(`已恢复初始图片: ${canvas.width} x ${canvas.height}`);
    });

    btnUndo.addEventListener("click", () => {
      if (!imageData || undoStack.length === 0) return;
      redoStack.push({
        data: cloneImageData(imageData),
        anns: JSON.parse(JSON.stringify(annotations)),
        counter: numberCounter
      });
      const prev = undoStack.pop();
      applyImageData(prev);
      setStatus(`已撤销，剩余可撤销 ${undoStack.length} 步`);
      updateButtons();
    });

    btnRedo.addEventListener("click", () => {
      if (!imageData || redoStack.length === 0) return;
      undoStack.push({
        data: cloneImageData(imageData),
        anns: JSON.parse(JSON.stringify(annotations)),
        counter: numberCounter
      });
      const next = redoStack.pop();
      applyImageData(next);
      setStatus(`已重做，剩余可重做 ${redoStack.length} 步`);
      updateButtons();
    });

    btnSave.addEventListener("click", () => {
      if (!imageData) return;
      const link = document.createElement("a");
      link.download = `cut-splice-${Date.now()}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      setStatus("已触发下载。");
    });

    window.addEventListener("paste", handlePaste);
    canvasBox.addEventListener("wheel", updateZoomByWheel, { passive: false });
    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      const ctrlOrMeta = event.ctrlKey || event.metaKey;

      // 工具快捷键 (不需 Ctrl)
      if (!ctrlOrMeta && imageData) {
        if (key === "s") {
          event.preventDefault();
          setTool("range");
          return;
        }
        if (key === "a") {
          event.preventDefault();
          setTool("arrow");
          return;
        }
        if (key === "n") {
          event.preventDefault();
          setTool("number");
          return;
        }
        if (key === "m") {
          event.preventDefault();
          setTool("mosaic");
          return;
        }
        if (key === "delete") {
          if (selectedAnnotation) {
            pushUndoState();
            annotations = annotations.filter(a => a !== selectedAnnotation);
            selectedAnnotation = null;
            setStatus("已删除选中的标注");
            render();
            return;
          }
          if (imageData && hasSelection()) {
            event.preventDefault();
            doCut();
          }
          return;
        }
      }

      if (!ctrlOrMeta) return;

      // 功能快捷键 (需 Ctrl)
      if (key === "z" && !event.shiftKey) {
        if (!btnUndo.disabled) {
          event.preventDefault();
          btnUndo.click();
        }
        return;
      }
      if ((key === "z" && event.shiftKey) || key === "y") {
        if (!btnRedo.disabled) {
          event.preventDefault();
          btnRedo.click();
        }
        return;
      }
      if (key === "m") {
        event.preventDefault();
        setTool("mosaic");
        return;
      }
    });

    setStatus("等待粘贴图片...");
    updateButtons();
  </script>
</body>

</html>
