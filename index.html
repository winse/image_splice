<html lang="zh-CN">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片粘贴裁剪接续工具</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #d8e0ec;
      --accent: #0a7b83;
      --text: #1b2a3a;
      --danger: #bd2d2d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #e9f6f7, var(--bg) 55%);
      min-height: 100vh;
      overflow-y: auto;
      padding: 16px;
    }

    .wrap {
      /* max-width: 1100px; */
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    .title {
      font-size: 20px;
      margin: 0 0 8px;
    }

    .hint {
      margin: 0;
      color: #536679;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      position: sticky;
      top: 8px;
      z-index: 30;
      box-shadow: 0 6px 16px rgba(27, 42, 58, 0.1);
    }

    .tool-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .tool-divider {
      width: 1px;
      height: 24px;
      background: #c9d7e6;
      margin: 0 2px;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.danger {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      font-size: 14px;
      color: #3f5165;
    }

    .canvas-box {
      overflow: auto;
      border: 1px dashed #99adbf;
      border-radius: 10px;
      background: #f8fbff;
      min-height: 260px;
      display: grid;
      place-items: center;
      padding: 8px;
    }

    canvas {
      max-width: none;
      display: block;
      background: #fff;
    }

    .empty {
      color: #688096;
      text-align: center;
      font-size: 14px;
      line-height: 1.8;
      padding: 24px 8px;
    }

    .metric {
      font-size: 13px;
      color: #34485c;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .metric span {
      background: #eef4fb;
      border: 1px solid #dbe7f5;
      border-radius: 6px;
      padding: 4px 8px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="panel">
      <h1 class="title">图片粘贴裁剪接续工具</h1>
      <p class="hint">按 <b>Ctrl + V</b> 粘贴图片。拖拽选择区间：普通拖拽=重置区间，<b>Ctrl</b> 拖拽=增加区间，<b>Shift</b> 拖拽=从已有区间减掉。点“矩形马赛克”后拖拽矩形可打码（快捷键 <b>Ctrl + M</b>）。“画箭头”拖拽绘制箭头，“数字标注”点击放置递增数字。按住 <b>Ctrl</b> + 滚轮可缩放，点“缩放还原 1:1”恢复。</p>
    </section>

    <section class="panel toolbar">
      <div class="tool-group">
        <button id="btnUndo" disabled>撤销 (Ctrl+Z)</button>
        <button id="btnRedo" disabled>重做 (Ctrl+Y)</button>
      </div>
      <div class="tool-divider" aria-hidden="true"></div>
      <div class="tool-group">
        <button id="btnMosaic" disabled>矩形马赛克</button>
        <button id="btnArrow" disabled>画箭头 (A)</button>
        <button id="btnNumber" disabled>数字标注 (N)</button>
        <button id="btnZoomReset" disabled>缩放还原 1:1</button>
      </div>
      <div class="tool-divider" aria-hidden="true"></div>
      <div class="tool-group">
        <button id="btnCut" class="danger" disabled>删除并接续</button>
        <button id="btnReset" disabled>恢复到初始图片</button>
      </div>
      <div class="tool-divider" aria-hidden="true"></div>
      <div class="tool-group">
        <button id="btnSave" class="primary" disabled>下载结果 PNG</button>
      </div>
      <span id="status" class="status">等待粘贴图片...</span>
    </section>

    <section class="panel">
      <div id="metrics" class="metric"></div>
      <div class="canvas-box">
        <canvas id="mainCanvas" hidden></canvas>
        <div id="empty" class="empty">未检测到图片<br />请先复制图片，再在此页面按 Ctrl + V</div>
      </div>
    </section>
  </div>

  <script>
    const canvas = document.getElementById("mainCanvas");
    const ctx = canvas.getContext("2d");
    const canvasBox = document.querySelector(".canvas-box");
    const empty = document.getElementById("empty");
    const statusEl = document.getElementById("status");
    const metricsEl = document.getElementById("metrics");

    const btnUndo = document.getElementById("btnUndo");
    const btnRedo = document.getElementById("btnRedo");
    const btnMosaic = document.getElementById("btnMosaic");
    const btnArrow = document.getElementById("btnArrow");
    const btnNumber = document.getElementById("btnNumber");
    const btnZoomReset = document.getElementById("btnZoomReset");
    const btnCut = document.getElementById("btnCut");
    const btnReset = document.getElementById("btnReset");
    const btnSave = document.getElementById("btnSave");

    let imageData = null;
    let originalData = null;
    let selecting = false;
    let dragStartY = null;
    let dragCurrentY = null;
    let dragMode = "replace";
    let dragType = "range";
    let cutRanges = [];
    let mosaicArmed = false;
    let mosaicStart = null;
    let mosaicCurrent = null;
    let arrowArmed = false;
    let arrowStart = null;
    let arrowCurrent = null;
    let numberArmed = false;
    let numberCounter = 1;
    const CUT_GAP_PX = 1;
    const CUT_GAP_COLOR = "#ffffff";
    const MOSAIC_BLOCK = 12;
    const MOSAIC_BLUR_RADIUS = 8;
    const ARROW_COLOR = "#ff4d4f"; // 更加亮丽的现代红色
    const ARROW_WIDTH = 3; // 基础宽度比例
    const NUMBER_COLOR = "#ff3333";
    const NUMBER_BG = "#ffffff";
    const NUMBER_SIZE = 24;
    const CLICK_CLEAR_THRESHOLD = 2;
    const ZOOM_MIN = 0.2;
    const ZOOM_MAX = 8;
    const ZOOM_STEP = 0.1;
    let zoomScale = 1;
    const MAX_HISTORY = 30;
    const undoStack = [];
    const redoStack = [];

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function hasSelection() {
      return cutRanges.length > 0;
    }

    function normalizeRange(yA, yB) {
      const y1 = Math.max(0, Math.min(yA, yB));
      const y2 = Math.min(canvas.height, Math.max(yA, yB));
      const h = Math.max(0, Math.round(y2 - y1));
      if (h <= 0) return null;
      return { y1: Math.round(y1), y2: Math.round(y2), h };
    }

    function mergeRanges(ranges) {
      if (ranges.length <= 1) return [...ranges];
      const sorted = [...ranges].sort((a, b) => a.y1 - b.y1);
      const merged = [{ ...sorted[0] }];
      for (let i = 1; i < sorted.length; i++) {
        const cur = sorted[i];
        const last = merged[merged.length - 1];
        if (cur.y1 <= last.y2) {
          last.y2 = Math.max(last.y2, cur.y2);
          last.h = last.y2 - last.y1;
        } else {
          merged.push({ ...cur });
        }
      }
      return merged;
    }

    function addRange(ranges, range) {
      return mergeRanges([...ranges, { ...range }]);
    }

    function subtractRange(ranges, sub) {
      const out = [];
      for (const r of ranges) {
        if (sub.y2 <= r.y1 || sub.y1 >= r.y2) {
          out.push({ ...r });
          continue;
        }
        if (sub.y1 > r.y1) {
          out.push({ y1: r.y1, y2: sub.y1, h: sub.y1 - r.y1 });
        }
        if (sub.y2 < r.y2) {
          out.push({ y1: sub.y2, y2: r.y2, h: r.y2 - sub.y2 });
        }
      }
      return out.filter((r) => r.h > 0);
    }

    function getPreviewRanges() {
      if (!selecting || dragType !== "range") return cutRanges;
      const draft = normalizeRange(dragStartY, dragCurrentY);
      if (!draft) return cutRanges;
      if (dragMode === "add") return addRange(cutRanges, draft);
      if (dragMode === "subtract") return subtractRange(cutRanges, draft);
      return [draft];
    }

    function totalSelectedHeight(ranges) {
      return ranges.reduce((sum, r) => sum + r.h, 0);
    }

    function modeText(mode) {
      if (mode === "add") return "增加";
      if (mode === "subtract") return "减去";
      return "重置";
    }

    function clearSelection() {
      selecting = false;
      dragType = "range";
      dragStartY = null;
      dragCurrentY = null;
      dragMode = "replace";
      cutRanges = [];
      mosaicStart = null;
      mosaicCurrent = null;
    }

    function updateButtons() {
      const hasImage = !!imageData;
      btnUndo.disabled = !hasImage || undoStack.length === 0;
      btnRedo.disabled = !hasImage || redoStack.length === 0;
      btnMosaic.disabled = !hasImage;
      btnArrow.disabled = !hasImage;
      btnNumber.disabled = !hasImage;
      btnZoomReset.disabled = !hasImage;
      btnReset.disabled = !hasImage;
      btnSave.disabled = !hasImage;
      btnCut.disabled = !hasImage || !hasSelection();
    }

    function applyCanvasZoom() {
      if (!imageData) return;
      canvas.style.width = `${Math.round(canvas.width * zoomScale)}px`;
      canvas.style.height = `${Math.round(canvas.height * zoomScale)}px`;
    }

    function cloneImageData(src) {
      return new ImageData(new Uint8ClampedArray(src.data), src.width, src.height);
    }

    function applyImageData(next) {
      canvas.width = next.width;
      canvas.height = next.height;
      ctx.putImageData(next, 0, 0);
      imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      clearSelection();
      render();
    }

    function pushUndoState() {
      if (!imageData) return;
      undoStack.push(cloneImageData(imageData));
      if (undoStack.length > MAX_HISTORY) undoStack.shift();
      redoStack.length = 0;
      updateButtons();
    }

    function clearHistory() {
      undoStack.length = 0;
      redoStack.length = 0;
      updateButtons();
    }

    function updateMetrics() {
      if (!imageData) {
        metricsEl.innerHTML = "";
        return;
      }
      const parts = [
        `<span>宽度: ${canvas.width}px</span>`,
        `<span>高度: ${canvas.height}px</span>`
      ];
      const ranges = getPreviewRanges();
      if (ranges.length > 0) {
        parts.push(`<span>区间数: ${ranges.length}</span>`);
        parts.push(`<span>将删除总高度: ${totalSelectedHeight(ranges)}px</span>`);
      }
      parts.push(`<span>缩放: ${(zoomScale * 100).toFixed(0)}%</span>`);
      if (selecting) {
        if (dragType === "range") {
          parts.push(`<span>当前模式: ${modeText(dragMode)}</span>`);
        } else if (dragType === "mosaic") {
          const rect = normalizeRect(mosaicStart, mosaicCurrent);
          if (rect) {
            parts.push(`<span>马赛克区域: ${rect.w} x ${rect.h}px</span>`);
          }
        }
      }
      if (mosaicArmed && !selecting) {
        parts.push("<span>马赛克模式: 已启用</span>");
      }
      metricsEl.innerHTML = parts.join("");
    }

    function normalizeRect(a, b) {
      if (!a || !b) return null;
      const x1 = Math.max(0, Math.min(a.x, b.x));
      const y1 = Math.max(0, Math.min(a.y, b.y));
      const x2 = Math.min(canvas.width, Math.max(a.x, b.x));
      const y2 = Math.min(canvas.height, Math.max(a.y, b.y));
      const w = Math.max(0, Math.round(x2 - x1));
      const h = Math.max(0, Math.round(y2 - y1));
      if (w <= 0 || h <= 0) return null;
      return { x: Math.round(x1), y: Math.round(y1), w, h };
    }

    function drawSelectionOverlay() {
      const ranges = getPreviewRanges();
      if (ranges.length > 0) {
        for (const r of ranges) {
          ctx.save();
          ctx.fillStyle = "rgba(189,45,45,0.22)";
          ctx.strokeStyle = "rgba(189,45,45,0.9)";
          ctx.lineWidth = 2;
          ctx.fillRect(0, r.y1, canvas.width, r.h);
          if (r.h >= 2) {
            ctx.strokeRect(1, r.y1 + 1, canvas.width - 2, r.h - 2);
          }
          ctx.restore();
        }
      }

      if (selecting && dragType === "mosaic") {
        const rect = normalizeRect(mosaicStart, mosaicCurrent);
        if (rect) {
          ctx.save();
          ctx.fillStyle = "rgba(10,123,131,0.22)";
          ctx.strokeStyle = "rgba(10,123,131,0.95)";
          ctx.lineWidth = 2;
          ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
          ctx.strokeRect(rect.x + 1, rect.y + 1, Math.max(0, rect.w - 2), Math.max(0, rect.h - 2));
          ctx.restore();
        }
      }

      if (selecting && dragType === "arrow" && arrowStart && arrowCurrent) {
        drawArrow(ctx, arrowStart, arrowCurrent);
      }
    }

    // 抽象出绘画逻辑，以便在预览和正式绘制时共用
    function drawArrow(pCtx, from, to) {
      const dist = Math.hypot(to.x - from.x, to.y - from.y);
      if (dist < 5) return;

      const angle = Math.atan2(to.y - from.y, to.x - from.x);
      
      // 这里的尺寸根据距离比例调整，获得更平滑的视觉效果
      const scale = Math.min(1.2, Math.max(0.6, dist / 150));
      const shaftStartWidth = 1 * scale;
      const shaftEndWidth = 6 * scale;
      const headWidth = 18 * scale;
      const headLength = 22 * scale;

      pCtx.save();
      pCtx.fillStyle = ARROW_COLOR;
      
      const vX = Math.cos(angle + Math.PI / 2);
      const vY = Math.sin(angle + Math.PI / 2);
      
      // 1. 渐变箭杆 (从尾部细到头部粗)
      // 箭杆在头部稍微重叠，确保视觉连贯
      const shaftEndX = to.x - Math.cos(angle) * (headLength * 0.8);
      const shaftEndY = to.y - Math.sin(angle) * (headLength * 0.8);
      
      pCtx.beginPath();
      // 尾部点
      pCtx.moveTo(from.x - vX * shaftStartWidth / 2, from.y - vY * shaftStartWidth / 2);
      pCtx.lineTo(from.x + vX * shaftStartWidth / 2, from.y + vY * shaftStartWidth / 2);
      // 头部连接点
      pCtx.lineTo(shaftEndX + vX * shaftEndWidth / 2, shaftEndY + vY * shaftEndWidth / 2);
      pCtx.lineTo(shaftEndX - vX * shaftEndWidth / 2, shaftEndY - vY * shaftEndWidth / 2);
      pCtx.closePath();
      pCtx.fill();
      
      // 2. 箭头帽
      const headBaseX = to.x - Math.cos(angle) * headLength;
      const headBaseY = to.y - Math.sin(angle) * headLength;
      
      pCtx.beginPath();
      pCtx.moveTo(to.x, to.y);
      pCtx.lineTo(headBaseX + vX * headWidth / 2, headBaseY + vY * headWidth / 2);
      pCtx.lineTo(headBaseX - vX * headWidth / 2, headBaseY - vY * headWidth / 2);
      pCtx.closePath();
      pCtx.fill();
      
      pCtx.restore();
    }

    function render() {
      if (!imageData) {
        canvas.hidden = true;
        empty.hidden = false;
        return;
      }
      canvas.hidden = false;
      empty.hidden = true;
      applyCanvasZoom();
      ctx.putImageData(imageData, 0, 0);
      drawSelectionOverlay();
      updateButtons();
      updateMetrics();
    }

    function loadImageToCanvas(img) {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      zoomScale = 1;
      clearSelection();
      clearHistory();
      setStatus(`图片已载入: ${canvas.width} x ${canvas.height}`);
      render();
    }

    async function handlePaste(event) {
      const items = event.clipboardData && event.clipboardData.items;
      if (!items) return;

      for (const item of items) {
        if (item.type && item.type.startsWith("image/")) {
          const file = item.getAsFile();
          if (!file) continue;
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            loadImageToCanvas(img);
            URL.revokeObjectURL(url);
          };
          img.onerror = () => {
            setStatus("图片读取失败，请重试。");
            URL.revokeObjectURL(url);
          };
          img.src = url;
          event.preventDefault();
          return;
        }
      }

      setStatus("剪贴板里没有图片数据。");
    }

    function getCanvasY(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleY = canvas.height / rect.height;
      return (event.clientY - rect.top) * scaleY;
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (event.clientX - rect.left) * scaleX,
        y: (event.clientY - rect.top) * scaleY
      };
    }

    function mosaicRectOnCurrentImage(rect, blockSize) {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tctx = tempCanvas.getContext("2d");
      tctx.putImageData(imageData, 0, 0);

      // 组合式马赛克：先模糊再块化
      // 简化版：使用块平均色
      for (let y = rect.y; y < rect.y + rect.h; y += blockSize) {
        for (let x = rect.x; x < rect.x + rect.w; x += blockSize) {
          const bw = Math.min(blockSize, rect.x + rect.w - x);
          const bh = Math.min(blockSize, rect.y + rect.h - y);
          // 取块内平均色
          const blockData = tctx.getImageData(x, y, bw, bh).data;
          let r = 0, g = 0, b = 0, count = 0;
          for (let i = 0; i < blockData.length; i += 4) {
            r += blockData[i];
            g += blockData[i + 1];
            b += blockData[i + 2];
            count++;
          }
          tctx.fillStyle = `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})`;
          tctx.fillRect(x, y, bw, bh);
        }
      }
      return tctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    // 画箭头
    function drawArrowOnImage(from, to) {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tctx = tempCanvas.getContext("2d");
      tctx.putImageData(imageData, 0, 0);

      drawArrow(tctx, from, to);
      
      return tctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    // 画数字标注
    function drawNumberOnImage(pos, num) {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tctx = tempCanvas.getContext("2d");
      tctx.putImageData(imageData, 0, 0);

      tctx.save();
      const text = String(num);
      tctx.font = `bold ${NUMBER_SIZE}px Arial, sans-serif`;
      
      // 圆形背景
      const radius = NUMBER_SIZE * 0.7;
      tctx.fillStyle = NUMBER_BG;
      tctx.beginPath();
      tctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
      tctx.fill();
      
      // 边框
      tctx.strokeStyle = NUMBER_COLOR;
      tctx.lineWidth = 2;
      tctx.stroke();
      
      // 文字
      tctx.fillStyle = NUMBER_COLOR;
      tctx.textAlign = "center";
      tctx.textBaseline = "middle";
      tctx.fillText(text, pos.x, pos.y);
      tctx.restore();
      
      return tctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    function clampZoom(next) {
      return Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, next));
    }

    function updateZoomByWheel(event) {
      if (!imageData || !event.ctrlKey) return;
      event.preventDefault();
      const dir = event.deltaY < 0 ? 1 : -1;
      const next = clampZoom(zoomScale + dir * ZOOM_STEP);
      if (next === zoomScale) return;
      zoomScale = next;
      render();
      setStatus(`当前缩放 ${(zoomScale * 100).toFixed(0)}%`);
    }

    canvas.addEventListener("mousedown", (e) => {
      if (!imageData) return;
      selecting = true;
      if (mosaicArmed) {
        dragType = "mosaic";
        mosaicStart = getCanvasPoint(e);
        mosaicCurrent = mosaicStart;
      } else if (arrowArmed) {
        dragType = "arrow";
        arrowStart = getCanvasPoint(e);
        arrowCurrent = arrowStart;
      } else if (numberArmed) {
        dragType = "number";
        const pos = getCanvasPoint(e);
        pushUndoState();
        imageData = drawNumberOnImage(pos, numberCounter);
        numberCounter++;
        selecting = false;
        setStatus(`已添加数字 ${numberCounter - 1}`);
        render();
        return;
      } else {
        dragType = "range";
        dragStartY = getCanvasY(e);
        dragCurrentY = dragStartY;
        if (e.shiftKey) {
          dragMode = "subtract";
        } else if (e.ctrlKey || e.metaKey) {
          dragMode = "add";
        } else {
          dragMode = "replace";
        }
      }
      render();
      updateButtons();
    });

    window.addEventListener("mousemove", (e) => {
      if (!selecting || !imageData) return;
      if (dragType === "mosaic") {
        mosaicCurrent = getCanvasPoint(e);
      } else if (dragType === "arrow") {
        arrowCurrent = getCanvasPoint(e);
      } else {
        dragCurrentY = getCanvasY(e);
      }
      render();
      updateButtons();
    });

    window.addEventListener("mouseup", () => {
      if (!selecting) return;
      if (dragType === "mosaic") {
        const rect = normalizeRect(mosaicStart, mosaicCurrent);
        selecting = false;
        mosaicStart = null;
        mosaicCurrent = null;
        if (rect) {
          pushUndoState();
          imageData = mosaicRectOnCurrentImage(rect, MOSAIC_BLOCK);
          mosaicArmed = false;
          setStatus(`已完成马赛克: x=${rect.x}, y=${rect.y}, ${rect.w}x${rect.h}px`);
        } else {
          setStatus("马赛克区域无效，请重新拖拽。");
        }
      } else if (dragType === "arrow") {
        selecting = false;
        if (arrowStart && arrowCurrent) {
          const dist = Math.hypot(arrowCurrent.x - arrowStart.x, arrowCurrent.y - arrowStart.y);
          if (dist > 5) {
            pushUndoState();
            imageData = drawArrowOnImage(arrowStart, arrowCurrent);
            setStatus(`已添加箭头`);
          }
        }
        arrowStart = null;
        arrowCurrent = null;
        arrowArmed = false;
      } else {
        const isPlainClick = dragMode === "replace"
          && dragStartY !== null
          && dragCurrentY !== null
          && Math.abs(dragCurrentY - dragStartY) <= CLICK_CLEAR_THRESHOLD;
        const draft = normalizeRange(dragStartY, dragCurrentY);
        if (isPlainClick) {
          cutRanges = [];
        } else if (draft) {
          if (dragMode === "add") {
            cutRanges = addRange(cutRanges, draft);
          } else if (dragMode === "subtract") {
            cutRanges = subtractRange(cutRanges, draft);
          } else {
            cutRanges = [draft];
          }
        }
        selecting = false;
        dragStartY = null;
        dragCurrentY = null;
        if (hasSelection()) {
          setStatus(`已更新区间：${cutRanges.length} 段，总删除高度 ${totalSelectedHeight(cutRanges)}px`);
        } else {
          setStatus("当前没有选中区间。");
        }
      }
      render();
      updateButtons();
    });

    btnMosaic.addEventListener("click", () => {
      if (!imageData) return;
      mosaicArmed = !mosaicArmed;
      arrowArmed = false;
      numberArmed = false;
      if (mosaicArmed) {
        selecting = false;
        dragType = "range";
        setStatus(`马赛克模式已开启：请在图片上拖拽矩形（块大小 ${MOSAIC_BLOCK}px）`);
      } else {
        setStatus("马赛克模式已关闭。");
      }
      render();
      updateButtons();
    });

    btnArrow.addEventListener("click", () => {
      if (!imageData) return;
      arrowArmed = !arrowArmed;
      mosaicArmed = false;
      numberArmed = false;
      if (arrowArmed) {
        selecting = false;
        dragType = "range";
        setStatus("箭头模式已开启：请在图片上拖拽绘制箭头");
      } else {
        setStatus("箭头模式已关闭。");
      }
      render();
      updateButtons();
    });

    btnNumber.addEventListener("click", () => {
      if (!imageData) return;
      numberArmed = !numberArmed;
      mosaicArmed = false;
      arrowArmed = false;
      if (numberArmed) {
        selecting = false;
        dragType = "range";
        setStatus(`数字标注模式已开启：点击图片放置数字 ${numberCounter}`);
      } else {
        setStatus("数字标注模式已关闭。");
      }
      render();
      updateButtons();
    });

    btnZoomReset.addEventListener("click", () => {
      if (!imageData) return;
      zoomScale = 1;
      render();
      setStatus("缩放已还原到 1:1");
    });

    btnCut.addEventListener("click", () => {
      if (!imageData || !hasSelection()) return;
      const ranges = mergeRanges(cutRanges);
      const removed = totalSelectedHeight(ranges);
      if (removed <= 0 || removed >= canvas.height) {
        setStatus("选中高度无效，无法删除整个图片。");
        return;
      }
      pushUndoState();

      const oldCanvas = document.createElement("canvas");
      oldCanvas.width = canvas.width;
      oldCanvas.height = canvas.height;
      oldCanvas.getContext("2d").putImageData(imageData, 0, 0);

      const gapTotal = CUT_GAP_PX * ranges.length;
      const newH = canvas.height - removed + gapTotal;
      const newCanvas = document.createElement("canvas");
      newCanvas.width = canvas.width;
      newCanvas.height = newH;
      const nctx = newCanvas.getContext("2d");
      nctx.fillStyle = CUT_GAP_COLOR;

      let srcY = 0;
      let dstY = 0;
      for (const r of ranges) {
        const keepH = r.y1 - srcY;
        if (keepH > 0) {
          nctx.drawImage(oldCanvas, 0, srcY, canvas.width, keepH, 0, dstY, canvas.width, keepH);
          dstY += keepH;
        }
        nctx.fillRect(0, dstY, canvas.width, CUT_GAP_PX);
        dstY += CUT_GAP_PX;
        srcY = r.y2;
      }
      const tailH = canvas.height - srcY;
      if (tailH > 0) {
        nctx.drawImage(oldCanvas, 0, srcY, canvas.width, tailH, 0, dstY, canvas.width, tailH);
      }

      canvas.width = newCanvas.width;
      canvas.height = newCanvas.height;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(newCanvas, 0, 0);
      imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      clearSelection();
      setStatus(`已删除 ${removed}px（${ranges.length} 段），并插入 ${ranges.length} 条 ${CUT_GAP_PX}px 裁剪缝`);
      render();
    });

    btnReset.addEventListener("click", () => {
      if (!originalData) return;
      pushUndoState();
      applyImageData(cloneImageData(originalData));
      setStatus(`已恢复初始图片: ${canvas.width} x ${canvas.height}`);
    });

    btnUndo.addEventListener("click", () => {
      if (!imageData || undoStack.length === 0) return;
      redoStack.push(cloneImageData(imageData));
      const prev = undoStack.pop();
      applyImageData(prev);
      setStatus(`已撤销，剩余可撤销 ${undoStack.length} 步`);
      updateButtons();
    });

    btnRedo.addEventListener("click", () => {
      if (!imageData || redoStack.length === 0) return;
      undoStack.push(cloneImageData(imageData));
      const next = redoStack.pop();
      applyImageData(next);
      setStatus(`已重做，剩余可重做 ${redoStack.length} 步`);
      updateButtons();
    });

    btnSave.addEventListener("click", () => {
      if (!imageData) return;
      const link = document.createElement("a");
      link.download = `cut-splice-${Date.now()}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      setStatus("已触发下载。");
    });

    window.addEventListener("paste", handlePaste);
    canvasBox.addEventListener("wheel", updateZoomByWheel, { passive: false });
    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      const ctrlOrMeta = event.ctrlKey || event.metaKey;

      // 快捷键 A 和 N 不需要 Ctrl
      if (key === "a" && !ctrlOrMeta && imageData) {
        event.preventDefault();
        btnArrow.click();
        return;
      }
      if (key === "n" && !ctrlOrMeta && imageData) {
        event.preventDefault();
        btnNumber.click();
        return;
      }

      if (!ctrlOrMeta) return;

      if (key === "z" && !event.shiftKey) {
        if (!btnUndo.disabled) {
          event.preventDefault();
          btnUndo.click();
        }
        return;
      }
      if (key === "m") {
        if (!btnMosaic.disabled) {
          event.preventDefault();
          btnMosaic.click();
        }
        return;
      }
      if ((key === "z" && event.shiftKey) || key === "y") {
        if (!btnRedo.disabled) {
          event.preventDefault();
          btnRedo.click();
        }
      }
    });

    setStatus("等待粘贴图片...");
    updateButtons();
  </script>
</body>

</html>
